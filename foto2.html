<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fotos - Protección Civil Muxía</title>

<style>
body{
  background-color: rgb(249,175,119);
  font-family: Arial, sans-serif;
  margin:0;
}

/* TITULO PRINCIPAL */
.titulo{
  text-align:center;
  font-size:40px;
  margin:30px 0;
}

/* TITULO AÑO */
.titulo-ano{
  font-size:28px;
  margin:40px 0 20px 40px;
  font-weight:bold;
}

/* GALERIA */
.galeria{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:0 40px 40px 40px;
}

.galeria img{
  width:280px;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid black;
  box-shadow:5px 5px 0px rgba(0,0,0,0.15);
  transition:0.3s;
  cursor:pointer;
}

.galeria img:hover{
  transform:scale(1.05);
}

/* ---------------- LIGHTBOX ---------------- */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);

  display:none;
  justify-content:center;
  align-items:center;

  z-index:9999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
  border:3px solid white;
}

.lightbox.activo{
  display:flex;
}
</style>
</head>

<body>

<h1 class="titulo">Fotos</h1>

<h2 class="titulo-ano">2002-2003</h2>

<div class="galeria">
<img src="foto1.png">
<img src="foto2.png">
<img src="foto3.png">
<img src="foto4.png">
<img src="foto5.png">
<img src="foto6.png">
<img src="foto7.png">
<img src="foto8.png">
<img src="foto9.png">
<img src="foto10.png">
<img src="foto11.png">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="imgGrande" src="">
</div>

<script>
const imagenes = document.querySelectorAll('.galeria img');
const lightbox = document.getElementById('lightbox');
const imgGrande = document.getElementById('imgGrande');

// abrir imagen
imagenes.forEach(img => {
  img.addEventListener('click', () => {
    lightbox.classList.add('activo');
    imgGrande.src = img.src;
  });
});

// cerrar al hacer click fuera
lightbox.addEventListener('click', () => {
  lightbox.classList.remove('activo');
});
</script>

</body>
</html>
