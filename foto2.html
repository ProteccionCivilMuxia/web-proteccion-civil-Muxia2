<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fotos - Protección Civil Muxía</title>

<style>
body{
background-color: rgb(249,175,119);
font-family: Arial, sans-serif;
margin:0;
}

/* TITULO PRINCIPAL */
.titulo{
text-align:center;
font-size:40px;
margin:30px 0;
}

/* TITULO AÑO */
.titulo-ano{
font-size:28px;
margin:40px 0 20px 40px;
font-weight:bold;
}

/* GALERIA */
.galeria{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:0 40px 40px 40px;
}

.galeria img{
width:280px;
height:180px;
object-fit:cover;
border-radius:10px;
border:2px solid black;
box-shadow:5px 5px 0px rgba(0,0,0,0.15);
transition:0.3s;
}

.galeria img:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<h1 class="titulo">Fotos</h1>

<h2 class="titulo-ano">2002-2003</h2>

<div class="galeria">
<img src="foto1.png" alt="foto 1">
<img src="foto2.png" alt="foto 2">
<img src="foto3.png" alt="foto 4">
<img src="foto3.png" alt="foto 5">
<img src="foto3.png" alt="foto 6">
<img src="foto3.png" alt="foto 7">
<img src="foto3.png" alt="foto 8">
<img src="foto3.png" alt="foto 9">
<img src="foto3.png" alt="foto 0">
<img src="foto3.png" alt="foto 10">
<img src="foto3.png" alt="foto 11">
</div>

</body>
</html>
